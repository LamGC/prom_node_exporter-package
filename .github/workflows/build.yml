name: Build and draft release

on:
  push:
    paths:
      - 'LATEST_VERSION'
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  id-token: write
  attestations: write
  artifact-metadata: write

jobs:
  # ── Debian (.deb) packages ─────────────────────────────────────────────
  build-deb:
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        arch: [amd64, arm64, armhf, i386, ppc64el, s390x, riscv64, mips64el]

    steps:
      - uses: actions/checkout@v6

      - name: Install build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq dpkg-dev fakeroot devscripts debhelper wget curl

      - name: Build .deb (${{ matrix.arch }})
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          ver=$(cat LATEST_VERSION | sed 's/^v//')
          cd node_exporter-deb
          ./build.sh -v "$ver" -a "${{ matrix.arch }}"

      - name: Lintian check (amd64 only)
        if: matrix.arch == 'amd64'
        run: |
          sudo apt-get install -y -qq lintian
          lintian node_exporter-deb/prometheus-node-exporter_*.deb
          rc=$?
          if [ $rc -ge 2 ]; then
            echo "lintian exited with errors (exit code $rc)" >&2
            exit 1
          fi
          echo "lintian passed (exit code $rc)"

      - name: Create source checksums
        run: |
          cd node_exporter-deb
          for deb in prometheus-node-exporter_*.deb; do
            cp build/source.sha256 "${deb}.source.sha256"
          done
          echo "Created source SHA256 files for $(echo prometheus-node-exporter_*.deb | wc -w) packages"

      - name: Attest build provenance
        uses: actions/attest@v4
        with:
          subject-path: node_exporter-deb/prometheus-node-exporter_*.deb

      - name: Upload .deb artifacts
        uses: actions/upload-artifact@v7
        with:
          name: deb-${{ matrix.arch }}
          path: |
            node_exporter-deb/prometheus-node-exporter_*.deb
            node_exporter-deb/prometheus-node-exporter_*.deb.source.sha256
          if-no-files-found: error
          retention-days: 30

  # ── Alpine (.apk) packages ─────────────────────────────────────────────
  build-apk:
    runs-on: ubuntu-24.04
    container: alpine:3.21
    strategy:
      fail-fast: false
      matrix:
        arch: [x86_64, aarch64, armv7, x86, s390x, ppc64le, riscv64]

    steps:
      - name: Install build dependencies
        run: apk add --no-cache bash wget curl alpine-sdk sudo git

      - uses: actions/checkout@v6

      - name: Setup build user
        run: |
          adduser -D -G abuild builder
          echo "builder ALL=(ALL) NOPASSWD: ALL" >> /etc/sudoers
          cp -r "$GITHUB_WORKSPACE" /tmp/workspace
          chown -R builder:abuild /tmp/workspace
          echo "WS=/tmp/workspace" >> "$GITHUB_ENV"

      - name: Build .apk (${{ matrix.arch }})
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          ver=$(cat "$WS"/LATEST_VERSION | sed 's/^v//')
          sudo -u builder HOME=/home/builder GITHUB_TOKEN="$GITHUB_TOKEN" \
            bash -c "cd '$WS'/node_exporter-apk && ./build.sh -v '$ver' -a '${{ matrix.arch }}'"

      - name: Collect artifacts
        run: |
          mkdir -p output
          find /home/builder/packages -name "prometheus-node-exporter-*.apk" -type f \
            -exec cp {} output/ \;
          if [ -f "$WS"/node_exporter-apk/build/source.sha256 ]; then
            cp "$WS"/node_exporter-apk/build/source.sha256 output/
          fi
          ls -la output/

      - name: Create source checksums
        run: |
          cd output
          for apk in prometheus-node-exporter-[0-9]*.apk; do
            cp source.sha256 "${apk}.source.sha256"
          done
          echo "Created source SHA256 files"

      - name: Attest build provenance
        uses: actions/attest@v4
        with:
          subject-path: output/prometheus-node-exporter-[0-9]*.apk

      - name: Upload .apk artifacts
        uses: actions/upload-artifact@v7
        with:
          name: apk-${{ matrix.arch }}
          path: |
            output/prometheus-node-exporter-[0-9]*.apk
            output/prometheus-node-exporter-[0-9]*.apk.source.sha256
          if-no-files-found: error
          retention-days: 30

  # ── RPM (.rpm) packages ────────────────────────────────────────────────
  build-rpm:
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            platform: linux/amd64
          - arch: aarch64
            platform: linux/arm64/v8
          - arch: ppc64le
            platform: linux/ppc64le
          - arch: s390x
            platform: linux/s390x

    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build RPM builder image
        uses: docker/build-push-action@v6
        with:
          context: ${{ github.workspace }}/node_exporter-rpm
          file: ${{ github.workspace }}/node_exporter-rpm/Dockerfile.builder
          platforms: ${{ matrix.platform }}
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: rpm-builder:latest

      - name: Build .rpm (${{ matrix.arch }})
        env:
          GH_TOKEN_INNER: ${{ github.token }}
        run: |
          mkdir -p rpmout
          docker run --rm --platform ${{ matrix.platform }} \
            -v "$GITHUB_WORKSPACE":/workspace:ro \
            -v "$GITHUB_WORKSPACE/rpmout":/output \
            -e GITHUB_TOKEN="$GH_TOKEN_INNER" \
            rpm-builder:latest bash -c '
              set -e
              useradd builder
              echo builder:password | chpasswd
              cp -r /workspace /tmp/ws
              chown -R builder:builder /tmp/ws

              ver=$(cat /tmp/ws/LATEST_VERSION | sed "s/^v//")
              runuser -u builder -- bash -c "
                cd /tmp/ws/node_exporter-rpm &&
                GITHUB_TOKEN=\"$GITHUB_TOKEN\" ./build.sh -v '\''$ver'\'' -a '\''${{ matrix.arch }}'\''
              "

              echo ""
              echo "=== SHA256 checksums ==="
              sha256sum /tmp/ws/node_exporter-rpm/rpmbuild/SOURCES/*.tar.gz || true
              sha256sum /tmp/ws/node_exporter-rpm/rpmbuild/SOURCES/*.tar.gz > /output/source.sha256 2>/dev/null || true
              echo "=== end SHA256 ==="
              echo ""

              find /tmp/ws/node_exporter-rpm -name "*.rpm" -type f \
                -exec cp {} /output/ \;
            '

      - name: List RPM artifacts
        run: ls -la rpmout/

      - name: Create source checksums
        run: |
          cd rpmout
          for rpm in *.rpm; do
            cp source.sha256 "${rpm}.source.sha256"
          done
          echo "Created source SHA256 files"

      - name: Attest build provenance
        uses: actions/attest@v4
        with:
          subject-path: rpmout/*.rpm

      - name: Upload .rpm artifacts
        uses: actions/upload-artifact@v7
        with:
          name: rpm-${{ matrix.arch }}
          path: |
            rpmout/*.rpm
            rpmout/*.rpm.source.sha256
          if-no-files-found: error
          retention-days: 30

  # ── Release draft ──────────────────────────────────────────────────────
  release:
    needs: [build-deb, build-apk, build-rpm]
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v6

      - name: Resolve version
        id: version
        run: |
          tag=$(cat LATEST_VERSION)
          plain="${tag#v}"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "plain=$plain" >> "$GITHUB_OUTPUT"

      - name: Check if release already exists
        id: check
        run: |
          if gh release view "${{ steps.version.outputs.tag }}" &>/dev/null; then
            echo "EXISTS=true" >> "$GITHUB_OUTPUT"
            echo "Release for ${{ steps.version.outputs.tag }} already exists — skipping release draft."
          else
            echo "EXISTS=false" >> "$GITHUB_OUTPUT"
            echo "No existing release for ${{ steps.version.outputs.tag }} — will create draft."
          fi
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Download all .deb artifacts
        if: steps.check.outputs.EXISTS == 'false'
        uses: actions/download-artifact@v4
        with:
          pattern: deb-*
          merge-multiple: true
          path: artifacts/deb/

      - name: Download all .apk artifacts
        if: steps.check.outputs.EXISTS == 'false'
        uses: actions/download-artifact@v4
        with:
          pattern: apk-*
          merge-multiple: true
          path: artifacts/apk/

      - name: Download all .rpm artifacts
        if: steps.check.outputs.EXISTS == 'false'
        uses: actions/download-artifact@v4
        with:
          pattern: rpm-*
          merge-multiple: true
          path: artifacts/rpm/

      - name: List artifacts
        if: steps.check.outputs.EXISTS == 'false'
        run: |
          echo "=== DEB ===" && ls -lh artifacts/deb/
          echo "=== APK ===" && ls -lh artifacts/apk/
          echo "=== RPM ===" && ls -lh artifacts/rpm/

      - name: Create Release Draft
        if: steps.check.outputs.EXISTS == 'false'
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ github.token }}
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }} — Debian + Alpine + RPM packages
          draft: true
          make_latest: true
          files: |
            artifacts/deb/*.deb
            artifacts/deb/*.deb.source.sha256
            artifacts/apk/*.apk
            artifacts/apk/*.apk.source.sha256
            artifacts/rpm/*.rpm
            artifacts/rpm/*.rpm.source.sha256
          body: |
            ## node_exporter ${{ steps.version.outputs.tag }}

            Pre-built packages for Debian/Ubuntu (`.deb`), Alpine Linux
            (`.apk`), and RHEL derivatives (`.rpm`).

            Upstream release: https://github.com/prometheus/node_exporter/releases/tag/${{ steps.version.outputs.tag }}

            ### 🔏 Build Provenance

            All packages have SLSA build provenance attestations generated
            by GitHub Actions. Verify with:

            ```bash
            gh attestation verify <package> --repo LamGC/prom_node_exporter-package
            ```

            `.source.sha256` files contain the SHA256 checksums of the
            upstream node_exporter tarballs used to build each package.

            ### Debian/Ubuntu (.deb)

            | Architecture | Package |
            |-------------|---------|
            | amd64 | `prometheus-node-exporter_${{ steps.version.outputs.plain }}-1_amd64.deb` |
            | arm64 | `prometheus-node-exporter_${{ steps.version.outputs.plain }}-1_arm64.deb` |
            | armhf | `prometheus-node-exporter_${{ steps.version.outputs.plain }}-1_armhf.deb` |
            | i386  | `prometheus-node-exporter_${{ steps.version.outputs.plain }}-1_i386.deb` |
            | ppc64el | `prometheus-node-exporter_${{ steps.version.outputs.plain }}-1_ppc64el.deb` |
            | s390x | `prometheus-node-exporter_${{ steps.version.outputs.plain }}-1_s390x.deb` |
            | riscv64 | `prometheus-node-exporter_${{ steps.version.outputs.plain }}-1_riscv64.deb` |
            | mips64el | `prometheus-node-exporter_${{ steps.version.outputs.plain }}-1_mips64el.deb` |

            ```bash
            sudo dpkg -i prometheus-node-exporter_*.deb
            sudo vi /etc/default/prometheus-node-exporter
            sudo systemctl start prometheus-node-exporter
            ```

            ### Alpine Linux (.apk)

            | Architecture | Package |
            |-------------|---------|
            | x86_64 | `prometheus-node-exporter-${{ steps.version.outputs.plain }}-r0.apk` |
            | aarch64 | `prometheus-node-exporter-${{ steps.version.outputs.plain }}-r0.apk` |
            | armv7 | `prometheus-node-exporter-${{ steps.version.outputs.plain }}-r0.apk` |
            | x86 | `prometheus-node-exporter-${{ steps.version.outputs.plain }}-r0.apk` |
            | s390x | `prometheus-node-exporter-${{ steps.version.outputs.plain }}-r0.apk` |
            | ppc64le | `prometheus-node-exporter-${{ steps.version.outputs.plain }}-r0.apk` |
            | riscv64 | `prometheus-node-exporter-${{ steps.version.outputs.plain }}-r0.apk` |

            ```bash
            sudo apk add --allow-untrusted prometheus-node-exporter-*.apk prometheus-node-exporter-openrc-*.apk
            sudo vi /etc/conf.d/node-exporter
            sudo rc-service node-exporter start
            ```

            ### RHEL / Fedora / CentOS (.rpm)

            | Architecture | Package |
            |-------------|---------|
            | x86_64 | `prometheus-node-exporter-${{ steps.version.outputs.plain }}-1.x86_64.rpm` |
            | aarch64 | `prometheus-node-exporter-${{ steps.version.outputs.plain }}-1.aarch64.rpm` |
            | ppc64le | `prometheus-node-exporter-${{ steps.version.outputs.plain }}-1.ppc64le.rpm` |
            | s390x | `prometheus-node-exporter-${{ steps.version.outputs.plain }}-1.s390x.rpm` |

            ```bash
            sudo rpm -i prometheus-node-exporter-*.rpm
            sudo vi /etc/sysconfig/prometheus-node-exporter
            sudo systemctl start prometheus-node-exporter
            ```

      - name: Done (release existed)
        if: steps.check.outputs.EXISTS == 'true'
        run: echo "Skipped — release draft already exists for ${{ steps.version.outputs.tag }}."
