name: Build and draft release

on:
  push:
    paths:
      - 'LATEST_VERSION'
    branches:
      - main
  workflow_dispatch:

jobs:
  # ── Debian (.deb) packages ─────────────────────────────────────────────
  build-deb:
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        arch: [amd64, arm64, armhf, i386, ppc64el, s390x, riscv64, mips64el]

    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq dpkg-dev fakeroot devscripts debhelper wget curl

      - name: Build .deb (${{ matrix.arch }})
        run: |
          ver=$(cat LATEST_VERSION | sed 's/^v//')
          cd node_exporter-deb
          ./build.sh -v "$ver" -a "${{ matrix.arch }}"

      - name: Lintian check (amd64 only)
        if: matrix.arch == 'amd64'
        run: |
          sudo apt-get install -y -qq lintian
          lintian node_exporter-deb/prometheus-node-exporter_*.deb
          rc=$?
          if [ $rc -ge 2 ]; then
            echo "lintian exited with errors (exit code $rc)" >&2
            exit 1
          fi
          echo "lintian passed (exit code $rc)"

      - name: Upload .deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: deb-${{ matrix.arch }}
          path: node_exporter-deb/prometheus-node-exporter_*.deb
          if-no-files-found: error
          retention-days: 30

  # ── Alpine (.apk) packages ─────────────────────────────────────────────
  build-apk:
    runs-on: ubuntu-24.04
    container: alpine:3.21
    strategy:
      fail-fast: false
      matrix:
        arch: [x86_64, aarch64, armv7, x86, s390x, ppc64le, riscv64]

    steps:
      - name: Install build dependencies
        run: apk add --no-cache bash wget curl alpine-sdk sudo git

      - uses: actions/checkout@v4

      - name: Setup build user
        run: |
          adduser -D -G abuild builder
          echo "builder ALL=(ALL) NOPASSWD: ALL" >> /etc/sudoers
          # container: mounts the workspace root-owned. Copy to a
          # writable location so the builder user can create build/.
          cp -r "$GITHUB_WORKSPACE" /tmp/workspace
          chown -R builder:abuild /tmp/workspace
          echo "WS=/tmp/workspace" >> "$GITHUB_ENV"

      - name: Build .apk (${{ matrix.arch }})
        run: |
          ver=$(cat "$WS"/LATEST_VERSION | sed 's/^v//')
          sudo -u builder HOME=/home/builder \
            bash -c "cd '$WS'/node_exporter-apk && ./build.sh -v '$ver' -a '${{ matrix.arch }}'"

      - name: Collect artifacts
        run: |
          mkdir -p output
          find /home/builder/packages -name "prometheus-node-exporter-*.apk" -type f \
            -exec cp {} output/ \;
          ls -la output/

      - name: Upload .apk artifact
        uses: actions/upload-artifact@v4
        with:
          name: apk-${{ matrix.arch }}
          path: output/prometheus-node-exporter-*.apk
          if-no-files-found: error
          retention-days: 30

  # ── Release draft ──────────────────────────────────────────────────────
  release:
    needs: [build-deb, build-apk]
    runs-on: ubuntu-24.04
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Resolve version
        id: version
        run: |
          tag=$(cat LATEST_VERSION)
          plain="${tag#v}"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "plain=$plain" >> "$GITHUB_OUTPUT"

      - name: Check if release already exists
        id: check
        run: |
          if gh release view "${{ steps.version.outputs.tag }}" &>/dev/null; then
            echo "EXISTS=true" >> "$GITHUB_OUTPUT"
            echo "Release for ${{ steps.version.outputs.tag }} already exists — skipping release draft."
          else
            echo "EXISTS=false" >> "$GITHUB_OUTPUT"
            echo "No existing release for ${{ steps.version.outputs.tag }} — will create draft."
          fi
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Download all .deb artifacts
        if: steps.check.outputs.EXISTS == 'false'
        uses: actions/download-artifact@v4
        with:
          pattern: deb-*
          merge-multiple: true
          path: artifacts/deb/

      - name: Download all .apk artifacts
        if: steps.check.outputs.EXISTS == 'false'
        uses: actions/download-artifact@v4
        with:
          pattern: apk-*
          merge-multiple: true
          path: artifacts/apk/

      - name: List artifacts
        if: steps.check.outputs.EXISTS == 'false'
        run: |
          echo "=== DEB packages ==="
          ls -lh artifacts/deb/ 2>/dev/null || echo "(none)"
          echo "=== APK packages ==="
          ls -lh artifacts/apk/ 2>/dev/null || echo "(none)"

      - name: Create Release Draft
        if: steps.check.outputs.EXISTS == 'false'
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ github.token }}
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }} — Debian + Alpine packages
          draft: true
          make_latest: true
          files: |
            artifacts/deb/*.deb
            artifacts/apk/*.apk
          body: |
            ## node_exporter ${{ steps.version.outputs.tag }}

            Pre-built packages for Debian/Ubuntu (`.deb`) and Alpine Linux (`.apk`).

            Upstream release: https://github.com/prometheus/node_exporter/releases/tag/${{ steps.version.outputs.tag }}

            ### Debian/Ubuntu (.deb)

            | Architecture | Package |
            |-------------|---------|
            | amd64 | `prometheus-node-exporter_${{ steps.version.outputs.plain }}-1_amd64.deb` |
            | arm64 | `prometheus-node-exporter_${{ steps.version.outputs.plain }}-1_arm64.deb` |
            | armhf | `prometheus-node-exporter_${{ steps.version.outputs.plain }}-1_armhf.deb` |
            | i386  | `prometheus-node-exporter_${{ steps.version.outputs.plain }}-1_i386.deb` |
            | ppc64el | `prometheus-node-exporter_${{ steps.version.outputs.plain }}-1_ppc64el.deb` |
            | s390x | `prometheus-node-exporter_${{ steps.version.outputs.plain }}-1_s390x.deb` |
            | riscv64 | `prometheus-node-exporter_${{ steps.version.outputs.plain }}-1_riscv64.deb` |
            | mips64el | `prometheus-node-exporter_${{ steps.version.outputs.plain }}-1_mips64el.deb` |

            ```bash
            sudo dpkg -i prometheus-node-exporter_*.deb
            sudo vi /etc/default/prometheus-node-exporter
            sudo systemctl start prometheus-node-exporter
            ```

            ### Alpine Linux (.apk)

            | Architecture | Package |
            |-------------|---------|
            | x86_64 | `prometheus-node-exporter-${{ steps.version.outputs.plain }}-r0.apk` |
            | aarch64 | `prometheus-node-exporter-${{ steps.version.outputs.plain }}-r0.apk` |
            | armv7 | `prometheus-node-exporter-${{ steps.version.outputs.plain }}-r0.apk` |
            | x86 | `prometheus-node-exporter-${{ steps.version.outputs.plain }}-r0.apk` |
            | s390x | `prometheus-node-exporter-${{ steps.version.outputs.plain }}-r0.apk` |
            | ppc64le | `prometheus-node-exporter-${{ steps.version.outputs.plain }}-r0.apk` |
            | riscv64 | `prometheus-node-exporter-${{ steps.version.outputs.plain }}-r0.apk` |

            ```bash
            sudo apk add --allow-untrusted prometheus-node-exporter-*.apk prometheus-node-exporter-openrc-*.apk
            sudo vi /etc/conf.d/node-exporter
            sudo rc-service node-exporter start
            ```

            > 🔒 **This is a draft release.** Review the artifacts, then click "Publish release" to make it public.

      - name: Done (release existed)
        if: steps.check.outputs.EXISTS == 'true'
        run: echo "Skipped — release draft already exists for ${{ steps.version.outputs.tag }}."
